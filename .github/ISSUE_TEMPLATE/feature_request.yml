name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What would you like to see added or changed?"
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: "Why is this useful? What problem does it solve?"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: "Links, screenshots, CAN logs, hardware details, etc."
